# =====================================================================
# AI Radar - application config
# (sources live in resources.yaml; your prompts live in prompts/)
# =====================================================================

llm:
  provider: groq                  # primary; switch to "ollama" to use the fallback

  groq:
    model: llama-3.3-70b-versatile
    api_key_env: GROQ_API_KEY     # NAME of the env var holding the key (see .env)

  ollama:
    model: gpt-oss:120b           # pick any model from your Ollama Cloud catalog
    host: https://ollama.com
    api_key_env: OLLAMA_API_KEY   # NAME of the env var holding the key (see .env)

pipeline:
  lookback_hours: 24        # only consider items published in this window
  triage_threshold: 50      # pass-1 score >= this -> gets a full read & summary
  max_text_chars: 8000      # truncate article text sent to the LLM (cost control)
  request_delay_seconds: 1  # pause between LLM calls (be nice to rate limits)

prompts:
  preferences: prompts/preferences.md
  rubric: prompts/rubric.md

db:
  path: radar.db

http:
  user_agent: "ai-radar/1.0 (personal research aggregator)"
